<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Viewer — {{ lotto_labels.get(lotto_type, lotto_type) }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif; background: #ffffff; color: #1a1a2e;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Top bar ── */
#topbar {
  background: #f0f0f0; border-bottom: 1px solid #cccccc;
  padding: 6px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  flex-shrink: 0; font-size: 1.7rem;
}
#topbar select { background:#ffffff; color:#1a1a2e; border:1px solid #aaaaaa;
  padding:8px 16px; border-radius:4px; cursor:pointer; font-size:1.28rem; }
#topbar button { background:#e0e0e0; color:#1a1a2e; border:1px solid #aaaaaa;
  padding:8px 16px; border-radius:4px; cursor:pointer; font-size:1.28rem; }
#topbar button:hover  { background:#cccccc; }
#topbar button.active { background:#4488ff; color:#ffffff; border-color:#4488ff; }
.sep { color:#aaaaaa; padding:0 4px; font-size:1.35rem; }
#window-info { display:none; }
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* ── Canvas area ── */
#canvas-wrap { flex:1; position:relative; overflow:hidden; padding:8px 12px 0 12px; background:#ffffff; }
#plot-canvas { display:block; width:100%; height:100%; cursor:default; }

/* ── Scrollbar row ── */
#scrollbar-row {
  flex-shrink:0; padding:4px 12px 2px 12px;
  display:flex; align-items:center; gap:8px; background:#f0f0f0;
}
#scrollbar { flex:1; accent-color:#89b4fa; height:6px; }
#scroll-label { display:none; }
#statusbar { display:none; }

/* ── Curve toolbar ── */
#curve-toolbar {
  flex-shrink:0; background:#181825; border-top:1px solid #313244;
  padding:4px 12px; display:flex; align-items:center; gap:10px; font-size:0.8rem;
}
#curve-toolbar label { color:#a6adc8; }
#curve-toolbar input[type=color]  { width:26px; height:20px; border:none; padding:0; background:none; cursor:pointer; }
#curve-toolbar input[type=range]  { accent-color:#a6e3a1; width:60px; }
.curve-btn { background:#313244; border:1px solid #45475a;
  padding:3px 10px; border-radius:4px; cursor:pointer; font-size:0.8rem; }

/* ── Dataset toolbar ── */
#dataset-toolbar {
  flex-shrink:0; background:#f0f0f0; border-top:1px solid #cccccc;
  padding:4px 12px; display:flex; align-items:center; gap:12px; font-size:0.8rem;
}
.ds-check-wrap { display:flex; align-items:center; gap:6px; cursor:pointer; }
.ds-check-wrap input[type=checkbox] { width:22px; height:22px; cursor:pointer; accent-color:var(--ds-color); }
.ds-check-wrap span { color:var(--ds-color); font-size:1.42rem; font-weight:700; line-height:1; }
#btn-redraw {
  background:#4488ff; color:#ffffff; border:none;
  padding:3px 14px; border-radius:4px; cursor:pointer; font-size:0.8rem; font-weight:bold;
  margin-left:6px;
}
#btn-redraw:hover { background:#2266dd; }

/* ── Dataset fade when curve/poly active ── */
#plot-canvas.mode-curve  { cursor: crosshair; }
#plot-canvas.mode-poly   { cursor: default; }
.datasets-faded .ds-check-wrap span { opacity: 0.4; }
.datasets-faded #btn-redraw { opacity: 0.4; pointer-events: none; }

/* ── Polynomial toolbar ── */
#poly-toolbar {
  flex-shrink:0; background:#f0f0f0; border-top:1px solid #cccccc;
  padding:4px 12px; display:flex; align-items:center; gap:10px; font-size:0.8rem;
}
#poly-toolbar label { color:#333333; }
#chk-poly { width:20px; height:20px; cursor:pointer; accent-color:#f38ba8; }
.led {
  width:10px; height:10px; border-radius:50%; display:inline-block;
  background:#2a2a3a; border:1px solid #45475a;
}
.led.lit { background:#f38ba8; box-shadow:0 0 5px #f38ba8; border-color:#f38ba8; }
#poly-clear-btn {
  background:#313244; color:#f38ba8; border:1px solid #45475a;
  padding:3px 10px; border-radius:4px; cursor:pointer; font-size:0.8rem;
}
#poly-clear-btn:hover { background:#45475a; }
#poly-status { display:none; }
#poly-curve-slots {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.poly-curve-slot {
  display:flex; align-items:center; gap:4px; cursor:pointer;
}
.poly-curve-slot input[type=checkbox] {
  width:18px; height:18px; cursor:pointer;
}
.poly-curve-slot span {
  font-size:1.08rem; font-weight:700; line-height:1;
}
.poly-curve-slot.is-empty {
  opacity:0.45;
}
.days-radio-group {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.days-radio {
  display:inline-flex; align-items:center; gap:4px; cursor:pointer;
  color:#1a1a2e; font-size:1.18rem; font-weight:700;
}
.days-radio input[type=radio] {
  width:18px; height:18px; cursor:pointer; accent-color:#4488ff;
}

/* ── Bands toolbar ── */
#bands-toolbar {
  display:flex; align-items:center; gap:10px; color:#333333;
  font-size:1.35rem;
}
#chk-bands { width:22px; height:22px; cursor:pointer; accent-color:#2dd4bf; }

/* ── Future Corridor Modal ── */
#fc-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200;
  display:block;
}
#fc-modal {
  position:absolute;
  background:#181825; border:1px solid #45475a; border-radius:8px;
  padding:0; width:360px; max-width:95vw; box-shadow:0 8px 32px rgba(0,0,0,0.6);
}
#fc-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 6px 14px; border-bottom:1px solid #313244; cursor:move;
  user-select:none;
}
#fc-title { font-size:0.92rem; font-weight:bold; color:#89b4fa; }
#fc-close {
  background:none; border:none; color:#6c7086; cursor:pointer;
  font-size:1rem; padding:0 4px; line-height:1;
}
#fc-close:hover { color:#f38ba8; }
#fc-subheader {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 14px; font-size:0.8rem; color:#a6adc8;
  border-bottom:1px solid #313244;
}
#fc-order-row {
  padding:8px 14px; display:flex; flex-direction:column; gap:4px;
  border-bottom:1px solid #313244; font-size:0.8rem; color:#a6adc8;
}
#fc-order-row input[type=checkbox] { accent-color:#89b4fa; cursor:pointer; }
#fc-order-note { font-size:0.72rem; color:#6c7086; margin-left:20px; }
#fc-grid {
  width:100%; border-collapse:collapse; margin:0; font-size:0.82rem;
}
#fc-grid th, #fc-grid td { padding:5px 10px; text-align:center; }
#fc-grid thead tr:first-child th { font-size:0.72rem; color:#6c7086; padding-bottom:2px; }
.fc-th-set { text-align:left !important; color:#6c7086 !important; min-width:44px; }
.fc-th-safe { color:#2dd4bf !important; }
.fc-th-hot  { color:#f87171 !important; }
.fc-td-label { text-align:left; color:#a6adc8; font-size:0.78rem; }
.fc-td-safe {
  background:#313244; color:#cdd6f4; border-radius:3px;
  font-weight:bold; min-width:40px;
}
.fc-td-hot {
  background:#f38ba8; color:#1e1e2e; border-radius:3px;
  font-weight:bold; min-width:40px;
}
.fc-td-hot-null { background:#24243a; color:#45475a; border-radius:3px; min-width:40px; }
#fc-status { padding:6px 14px 10px 14px; font-size:0.75rem; color:#6c7086; min-height:1.4em; }

/* ── Status bar ── */
#statusbar {
  flex-shrink:0; background:#f0f0f0; border-top:1px solid #cccccc;
  padding:3px 12px; font-size:0.78rem; color:#333333;
  display:flex; gap:20px; align-items:center;
}

/* ── Inspection popup ── */
#inspect-box {
  position:absolute; display:none;
  background:#313244; border:1px solid #89b4fa; border-radius:6px;
  padding:10px 14px; font-size:0.82rem; pointer-events:none;
  min-width:175px; z-index:10;
}
#inspect-box .ib-date  { color:#89b4fa; font-weight:bold; margin-bottom:4px; }
#inspect-box .ib-idx   { color:#a6adc8; font-size:0.75rem; margin-bottom:6px; }
#inspect-box .ib-balls { display:flex; flex-wrap:wrap; gap:5px; }
.wins-ball {
  width:42px; height:42px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:1.7rem; font-weight:bold; color:#fff;
}
.ball {
  width:28px; height:28px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:bold;
}
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div id="topbar">
  <!-- 1. Home -->
  <a href="/home" style="color:#ffffff;font-size:1.38rem;text-decoration:none;padding:7px 14px;background:#4488ff;border:1px solid #2266dd;border-radius:4px;font-weight:bold;">Home</a>

  <span class="sep">|</span>

  <!-- 2. Lotto type dropdown -->
  <select id="sel-lotto">
    {% for lt in lotto_types %}
    <option value="{{ lt }}" {% if lt == lotto_type %}selected{% endif %}>
      {{ lotto_labels.get(lt, lt) }}
    </option>
    {% endfor %}
  </select>

  <span class="sep">|</span>

  <!-- 3. Draw button -->
  <button id="btn-redraw">Draw</button>

  <span class="sep">|</span>

  <!-- 4. Set checkboxes -->
  <label class="ds-check-wrap" style="--ds-color:#8a2be2"><input type="checkbox" id="chk-1" checked><span>1</span></label>
  <label class="ds-check-wrap" style="--ds-color:#ff4500"><input type="checkbox" id="chk-2" checked><span>2</span></label>
  <label class="ds-check-wrap" style="--ds-color:#000080"><input type="checkbox" id="chk-3" checked><span>3</span></label>
  <label class="ds-check-wrap" style="--ds-color:#006400"><input type="checkbox" id="chk-4" checked><span>4</span></label>
  <label class="ds-check-wrap" style="--ds-color:#4b0082"><input type="checkbox" id="chk-5" checked><span>5</span></label>
  <label class="ds-check-wrap" style="--ds-color:#a52a2a"><input type="checkbox" id="chk-6" checked><span>6</span></label>

  <span class="sep">|</span>

  <!-- 5. Days selector -->
  <div class="days-radio-group">
    {% for d in window_days %}
    <label class="days-radio">
      <input type="radio" name="days-option" class="days-radio-input" data-days="{{ d }}" {% if d == days %}checked{% endif %}>
      <span>{% if loop.index == 1 %}A{% elif loop.index == 2 %}B{% elif loop.index == 3 %}C{% else %}D{% endif %}</span>
    </label>
    {% endfor %}
  </div>

  <span class="sep">|</span>

  <!-- 6. Navigation -->
  <button id="btn-end">End ⏭</button>

  <span class="sep">|</span>

  <!-- 7. Cubic fit -->
  <input type="checkbox" id="chk-poly">
  <label for="chk-poly">Cubic fit:</label>
  <span class="led" id="led-1"></span>
  <span class="led" id="led-2"></span>
  <span class="led" id="led-3"></span>
  <span class="led" id="led-4"></span>
  <span id="poly-pt-count" style="color:#cc0000;font-size:1rem;min-width:52px;"></span>
  <button id="poly-clear-btn">Clear</button>
  <div id="poly-curve-slots">
    <label class="poly-curve-slot is-empty" id="poly-slot-wrap-1"><input type="checkbox" id="poly-slot-1" disabled><span id="poly-slot-label-1" style="color:#8a2be2">1</span></label>
    <label class="poly-curve-slot is-empty" id="poly-slot-wrap-2"><input type="checkbox" id="poly-slot-2" disabled><span id="poly-slot-label-2" style="color:#ff4500">2</span></label>
    <label class="poly-curve-slot is-empty" id="poly-slot-wrap-3"><input type="checkbox" id="poly-slot-3" disabled><span id="poly-slot-label-3" style="color:#000080">3</span></label>
    <label class="poly-curve-slot is-empty" id="poly-slot-wrap-4"><input type="checkbox" id="poly-slot-4" disabled><span id="poly-slot-label-4" style="color:#006400">4</span></label>
    <label class="poly-curve-slot is-empty" id="poly-slot-wrap-5"><input type="checkbox" id="poly-slot-5" disabled><span id="poly-slot-label-5" style="color:#4b0082">5</span></label>
    <label class="poly-curve-slot is-empty" id="poly-slot-wrap-6"><input type="checkbox" id="poly-slot-6" disabled><span id="poly-slot-label-6" style="color:#a52a2a">6</span></label>
  </div>
  <span id="poly-status" style="color:#888888;font-size:0.75rem;">Check to begin selecting 4 points</span>

  <span class="sep">|</span>

  <!-- 8. Future Corridor -->
  <button id="btn-future-corridor">Future Corridor</button>
  <div id="bands-toolbar" style="display:none;">
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:1.3rem;">
      <input type="checkbox" id="chk-bands"> Show Bands
    </label>
    <span id="bands-legend" style="display:none;align-items:center;gap:12px;margin-left:6px;font-size:1.1rem;">
      <span><span style="color:#2dd4bf;font-weight:bold;">â”â”</span> SAFE</span>
      <span><span style="color:#f87171;">â•Œ â•Œ</span> HOT</span>
    </span>
  </div>

  <div class="topbar-right">
    <span class="sep">|</span>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;">
      <input type="checkbox" id="chk-measure-draws">
      <span>Measure # of Drawings</span>
    </label>
    <span id="measure-info" style="font-size:1rem;color:#555555;min-width:120px;"></span>

    <span class="sep">|</span>
    <span id="wins-date" style="font-size:1.7rem;font-weight:bold;color:#555555;min-width:130px;"></span>
    <div id="wins-balls" style="display:flex;gap:5px;align-items:center;"></div>
    <span id="window-info"></span>
  </div>
</div>

<!-- ── Canvas ── -->
<div id="canvas-wrap">
  <canvas id="plot-canvas"></canvas>
  <div id="inspect-box">
    <div class="ib-date" id="ib-date"></div>
    <div class="ib-idx"  id="ib-idx"></div>
    <div class="ib-balls" id="ib-balls"></div>
  </div>
</div>

<!-- ── Scrollbar ── -->
<div id="scrollbar-row">

  <input type="range" id="scrollbar"

  <label style="display:flex;align-items:center;gap:5px;cursor:pointer;">
    <input type="checkbox" id="chk-bands-legacy"> Show Bands
  </label>
  <span id="bands-legend-legacy" style="display:none;align-items:center;gap:12px;margin-left:6px;font-size:0.75rem;">
    <span><span style="color:#2dd4bf;font-weight:bold;">━━</span> SAFE</span>
    <span><span style="color:#f87171;">╌ ╌</span> HOT</span>

</div>

<!-- ── Status bar ── -->
<div id="statusbar">
  <span id="status-window"></span>
  <span id="status-count"></span>
  <span id="status-hover"></span>

<!-- ── Future Corridor Modal ── -->
<div id="fc-overlay" style="display:none;">
  <div id="fc-modal">
    <div id="fc-header">
      <span id="fc-title">Future Corridor</span>
      <button id="fc-close">✕</button>
    </div>
    <div id="fc-subheader">
      <span id="fc-lotto-label"></span>
      <span id="fc-date-label"></span>

      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">

          <th class="fc-th-safe">Low</th>

          <th class="fc-th-hot">High</th>

      <tbody id="fc-tbody"></tbody>
    </table>
    <div id="fc-status"></div>

<script>
"use strict";

// ── Initial state from server ─────────────────────────────────────
const S = {
  lotto:      "{{ lotto_type }}",
  days:       {{ days }},
  anchor:     "{{ anchor }}",         // dtCutOffNow  (YYYY-MM-DD)
  cutoffPast: "{{ cutoff_past }}",    // dtCutOffPast (YYYY-MM-DD)
  earliest:   "{{ earliest }}",
  latest:     "{{ latest }}",
  indexLo:    {{ index_lo }},
  indexHi:    {{ index_hi }},
  effDays:    {{ eff_days }},
  draws:      [],
  curveOn:    false,
  curves:     [],
  curCurve:   null,
  visibleSets: [1,2,3,4,5,6],   // all on at page load
  bandsOn:     false,
  bandData:    [],
  measure: {
    active: false,
    start: null,
    end: null,
  },
  poly: {
    active:  false,      // checkbox on?
    points:  [],
    currentSet: null,
    curves:   Array(7).fill(null),
    minV:    0,          // last-rendered Y range — kept in sync with render()
    maxV:    1,
  },
};

// ── DOM ───────────────────────────────────────────────────────────
const canvas    = document.getElementById("plot-canvas");
const ctx2d     = canvas.getContext("2d");
const wrap      = document.getElementById("canvas-wrap");
const scrollbar = document.getElementById("scrollbar");
const scrollLbl = document.getElementById("scroll-label");
const winInfo   = document.getElementById("window-info");
const statusWin = document.getElementById("status-window");
const statusCnt = document.getElementById("status-count");
const statusHov = document.getElementById("status-hover");
const inspBox   = document.getElementById("inspect-box");
const measureInfo = document.getElementById("measure-info");

const bandsLegend = document.getElementById("bands-legend");
if (bandsLegend) {
  bandsLegend.innerHTML = `<span>SAFE</span><span>HOT</span>`;
}

// ── Per-set colours ───────────────────────────────────────────────
const SET_COLORS = ["#8a2be2","#ff4500","#000080","#006400","#4b0082","#a52a2a"];

function updatePolyCurveToggles() {
  for (let s = 1; s <= 6; s++) {
    const wrap = document.getElementById(`poly-slot-wrap-${s}`);
    const box = document.getElementById(`poly-slot-${s}`);
    const label = document.getElementById(`poly-slot-label-${s}`);
    const curve = S.poly.curves[s];
    label.textContent = String(s);
    label.style.color = SET_COLORS[s - 1];
    box.disabled = !curve;
    box.checked = !!(curve && curve.visible);
    wrap.classList.toggle("is-empty", !curve);
  }
}

// ── Fetch draws for current window ───────────────────────────────
async function fetchDraws() {
  const url = `/api/draws?lotto=${S.lotto}&cutoff_now=${S.anchor}&cutoff_past=${S.cutoffPast}`;
  const r = await fetch(url);
  S.draws = await r.json();
  if (S.measure.active) {
    const dates = new Set(S.draws.map(d => d.DrawDate));
    const keepStart = S.measure.start && dates.has(S.measure.start.draw.DrawDate);
    const keepEnd = S.measure.end && dates.has(S.measure.end.draw.DrawDate);
    if (!keepStart || (S.measure.end && !keepEnd)) clearMeasureSelection();
  }
}

// ── Canvas sizing ─────────────────────────────────────────────────
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
}

// ── Plot geometry ─────────────────────────────────────────────────
const PAD = { top: 20, right: 36, bottom: 32, left: 10 };
function pW() { return canvas.width  - PAD.left - PAD.right; }
function pH() { return canvas.height - PAD.top  - PAD.bottom; }

// Map a draw to an X pixel by its position index (equal spacing).
// S._dateIndexMap is built at render time: dateStr -> position index (0-based).
// One extra slot is reserved at the right for the "future draw" space.
function xOfDate(dateStr) {
  const map   = S._dateIndexMap;
  const total = S._drawCount + 1;   // +1 for future space
  if (!map || total <= 1) return PAD.left;
  const i = (map[dateStr] !== undefined) ? map[dateStr] : total - 1;
  return PAD.left + (i / (total - 1)) * pW();
}

function yOfValue(v, minV, maxV) {
  if (maxV === minV) return PAD.top + pH() / 2;
  return PAD.top + pH() - ((v - minV) / (maxV - minV)) * pH();
}

// Pixel X → nearest draw (by date proximity)
function drawAtX(px) {
  if (!S.draws.length) return null;
  let best = null, bestDist = Infinity;
  for (const d of S.draws) {
    const dx = Math.abs(xOfDate(d.DrawDate) - px);
    if (dx < bestDist) { bestDist = dx; best = d; }
  }
  return best;
}

function formatDisplayDate(dateStr) {
  if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr || "";
  const [yyyy, mm, dd] = dateStr.split("-");
  return `${mm}/${dd}/${yyyy}`;
}

function formatMonthYear(dateStr) {
  if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr || "";
  const [yyyy, mm] = dateStr.split("-");
  return `${mm}/${yyyy}`;
}

const VIEWER_GAME_LIMITS = {
  CA: { mainMin: 1, mainMax: 47, bonusMin: 1, bonusMax: 27 },
  FL: { mainMin: 1, mainMax: 53, bonusMin: 1, bonusMax: 53 },
  MM: { mainMin: 1, mainMax: 70, bonusMin: 1, bonusMax: 25 },
  PB: { mainMin: 1, mainMax: 69, bonusMin: 1, bonusMax: 26 },
  PD: { mainMin: 1, mainMax: 69, bonusMin: 1, bonusMax: 26 },
};

function getViewerRangeLimits(lotto, visibleSets) {
  const limits = VIEWER_GAME_LIMITS[lotto] || VIEWER_GAME_LIMITS.CA;
  let minV = Infinity;
  let maxV = -Infinity;

  for (const s of visibleSets) {
    if (s === 6) {
      minV = Math.min(minV, limits.bonusMin);
      maxV = Math.max(maxV, limits.bonusMax);
    } else {
      minV = Math.min(minV, limits.mainMin);
      maxV = Math.max(maxV, limits.mainMax);
    }
  }

  if (!isFinite(minV) || !isFinite(maxV)) {
    return { minV: 1, maxV: limits.mainMax };
  }
  return { minV, maxV };
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  resizeCanvas();
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);

  const draws = S.draws;

  // Update labels
  winInfo.textContent = S.cutoffPast + " → " + S.anchor +
    (S.lotto === "PB" || S.lotto === "PD"
      ? `  (${S.days}d × 0.6 = ${S.effDays}d)` : `  (${S.effDays}d)`);
  statusWin.textContent = `${S.cutoffPast} → ${S.anchor}`;
  statusCnt.textContent = draws.length + " draws";
  winInfo.textContent = formatDisplayDate(S.cutoffPast) + " to " + formatDisplayDate(S.anchor) +
    (S.lotto === "PB" || S.lotto === "PD"
      ? `  (${S.days}d x 0.6 = ${S.effDays}d)` : `  (${S.effDays}d)`);
  statusWin.textContent = `${formatDisplayDate(S.cutoffPast)} to ${formatDisplayDate(S.anchor)}`;

  if (!draws.length) {
    ctx2d.fillStyle = "#585b70";
    ctx2d.font = "14px Arial";
    ctx2d.fillText("No draws in this window", PAD.left + 10, PAD.top + 30);
    renderCurves();
    return;
  }

  // Compute X-axis end: anchor + one average draw interval (future draw space)
  // Average interval from last few draws; fallback to 3.5 days (CA ~Wed+Sat)
  let drawIntervalMs = 3.5 * 86400000;
  if (draws.length >= 2) {
    const last  = new Date(draws[draws.length - 1].DrawDate + "T00:00:00");
    const prev  = new Date(draws[draws.length - 2].DrawDate + "T00:00:00");
    drawIntervalMs = Math.max(last - prev, 86400000);
  }
  const anchorMs = new Date(S.anchor + "T00:00:00").getTime();
  S.poly._xEnd = new Date(anchorMs + drawIntervalMs);

  // Pre-sort draws and cache ms timestamps for snap accuracy
  const sortedDraws = [...draws].sort((a, b) => a.DrawDate < b.DrawDate ? -1 : 1);
  sortedDraws.forEach(d => { d._ms = new Date(d.DrawDate + "T00:00:00").getTime(); });
  S.poly._sortedDraws = sortedDraws;
  S.poly._past_ms    = new Date(S.cutoffPast + "T00:00:00").getTime();
  S.poly._xEnd_ms    = S.poly._xEnd.getTime();

  // Build date->position index map for equal-spaced X axis
  S._dateIndexMap = {};
  sortedDraws.forEach((d, i) => { S._dateIndexMap[d.DrawDate] = i; });
  S._drawCount = sortedDraws.length;

  // Value range across visible sets only
  let minV = Infinity, maxV = -Infinity;
  for (const d of draws) {
    for (const s of S.visibleSets) {
      const v = d[`Nbr${s}`];
      if (v != null) { minV = Math.min(minV, v); maxV = Math.max(maxV, v); }
    }
  }
  const rangeLimits = getViewerRangeLimits(S.lotto, S.visibleSets);
  minV = rangeLimits.minV;
  maxV = rangeLimits.maxV;
  // Keep in sync so click handler uses identical Y mapping
  S.poly.minV = minV; S.poly.maxV = maxV;
  // Cache exact canvas geometry used for this render
  S.poly._pW = pW(); S.poly._pH = pH();
  S.poly._canvasW = canvas.width; S.poly._canvasH = canvas.height;

  // Y grid: one line per integer ball value that actually appears, labels on RIGHT
  // Collect every unique integer value visible in this window
  const allVals = new Set();
  for (const d of draws) {
    for (const s of S.visibleSets) {
      const v = d[`Nbr${s}`];
      if (v != null) allVals.add(Math.round(v));
    }
  }
  // Also include every integer between minV and maxV for a full proportional grid
  for (let v = Math.ceil(minV); v <= Math.floor(maxV); v++) allVals.add(v);
  const sortedVals = [...allVals].sort((a, b) => a - b);

  ctx2d.font = "bold 11px Arial"; ctx2d.textAlign = "left"; ctx2d.fillStyle = "#000000";
  for (const v of sortedVals) {
    const y = yOfValue(v, minV, maxV);
    if (y < PAD.top - 1 || y > PAD.top + pH() + 1) continue;
    // Gridline
    ctx2d.strokeStyle = "#707070"; ctx2d.lineWidth = 1;
    ctx2d.beginPath(); ctx2d.moveTo(PAD.left, y); ctx2d.lineTo(PAD.left + pW(), y); ctx2d.stroke();
    // Label on RIGHT
    ctx2d.fillStyle = "#000000";
    ctx2d.fillText(v, PAD.left + pW() + 4, y + 3);
  }

  // X vertical line for every draw; date labels at ~6 evenly spaced intervals
  const labelStep = Math.max(1, Math.floor(draws.length / 6));
  for (let i = 0; i < draws.length; i++) {
    const x = xOfDate(draws[i].DrawDate);
    ctx2d.strokeStyle = "#707070"; ctx2d.lineWidth = 1;
    ctx2d.beginPath(); ctx2d.moveTo(x, PAD.top); ctx2d.lineTo(x, PAD.top + pH()); ctx2d.stroke();
  }
  ctx2d.fillStyle = "#000000"; ctx2d.font = "bold 22px Arial"; ctx2d.textAlign = "center";
  for (let i = 0; i < draws.length; i += labelStep) {
    const x = xOfDate(draws[i].DrawDate);
    ctx2d.fillText(formatMonthYear(draws[i].DrawDate), x, canvas.height - PAD.bottom + 20);
  }

  ctx2d.globalAlpha = 1.0;

  // Sets 1–5: lines + dots (only visible sets)
  for (let s = 1; s <= 5; s++) {
    if (!S.visibleSets.includes(s)) continue;
    const color = SET_COLORS[s - 1];
    ctx2d.strokeStyle = color; ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    let started = false;
    for (const d of draws) {
      const v = d[`Nbr${s}`];
      if (v == null) continue;
      const x = xOfDate(d.DrawDate), y = yOfValue(v, minV, maxV);
      if (!started) { ctx2d.moveTo(x, y); started = true; } else ctx2d.lineTo(x, y);
    }
    ctx2d.stroke();
    for (const d of draws) {
      const v = d[`Nbr${s}`];
      if (v == null) continue;
      ctx2d.fillStyle = color;
      ctx2d.beginPath(); ctx2d.arc(xOfDate(d.DrawDate), yOfValue(v, minV, maxV), 4.5, 0, Math.PI*2);
      ctx2d.fill();
    }
  }

  // Set 6: draw in the same visible style as the other sets
  const b6 = draws.filter(d => d.Nbr6 != null);
  if (b6.length && S.visibleSets.includes(6)) {
    ctx2d.strokeStyle = SET_COLORS[5]; ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    let started = false;
    for (const d of b6) {
      const x = xOfDate(d.DrawDate), y = yOfValue(d.Nbr6, minV, maxV);
      if (!started) { ctx2d.moveTo(x, y); started = true; } else ctx2d.lineTo(x, y);
    }
    ctx2d.stroke();
    for (const d of b6) {
      const x = xOfDate(d.DrawDate), y = yOfValue(d.Nbr6, minV, maxV);
      ctx2d.fillStyle = SET_COLORS[5];
      ctx2d.beginPath(); ctx2d.arc(x, y, 4.5, 0, Math.PI*2);
      ctx2d.fill();
    }
  }

  ctx2d.globalAlpha = 1.0;  // restore before overlays
  renderPolyOverlays(minV, maxV);
  renderCurves();
  renderBands(minV, maxV);
  renderMeasureOverlay();
}

function renderCurves() {
  const allCurves = S.curCurve ? [...S.curves, S.curCurve] : S.curves;
  for (const c of allCurves) {
    if (c.pts.length < 2) continue;
    ctx2d.strokeStyle = c.color; ctx2d.lineWidth = c.width;
    ctx2d.lineJoin = "round"; ctx2d.lineCap = "round";
    ctx2d.beginPath();
    ctx2d.moveTo(c.pts[0].x, c.pts[0].y);
    for (let i = 1; i < c.pts.length; i++) ctx2d.lineTo(c.pts[i].x, c.pts[i].y);
    ctx2d.stroke();
  }
}

// ── Fetch SAFE/HOT bands for the one visible set ──────────────────
async function fetchBands() {
  if (!S.bandsOn || S.visibleSets.length !== 1) { S.bandData = []; return; }
  const setNum = S.visibleSets[0];
  const url = `/api/forecast_chart?lotto=${S.lotto}&cutoff_now=${S.anchor}&cutoff_past=${S.cutoffPast}`;
  const r = await fetch(url);
  const all = await r.json();
  S.bandData = all.filter(row => row.SetNumber === setNum);
}

// ── Draw SAFE (teal solid) and HOT (red dashed) band lines ────────
function renderBands(minV, maxV) {
  if (!S.bandsOn || !S.bandData.length) return;

  function drawLine(getVal, color, dash) {
    ctx2d.strokeStyle = color;
    ctx2d.lineWidth = 1.5;
    ctx2d.setLineDash(dash);
    ctx2d.beginPath();
    let started = false;
    for (const row of S.bandData) {
      const v = getVal(row);
      if (v == null) continue;
      const x = xOfDate(row.DrawDate);
      const y = yOfValue(v, minV, maxV);
      if (!started) { ctx2d.moveTo(x, y); started = true; }
      else ctx2d.lineTo(x, y);
    }
    ctx2d.stroke();
    ctx2d.setLineDash([]);
  }

  drawLine(r => r.SafeHigh, "#2dd4bf", []);
  drawLine(r => r.SafeLow,  "#2dd4bf", []);
  drawLine(r => r.HotHigh,  "#f87171", [5, 4]);
  drawLine(r => r.HotLow,   "#f87171", [5, 4]);
}

function renderPolyPointList(points, setNo, minV, maxV) {
  if (!points || !points.length) return;
  const color = SET_COLORS[(setNo || 1) - 1] || "#f38ba8";
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    const x = xOfDate(p.date);
    const y = yOfValue(p.val, minV, maxV);
    ctx2d.strokeStyle = color; ctx2d.lineWidth = 2;
    ctx2d.beginPath(); ctx2d.arc(x, y, 8, 0, Math.PI * 2); ctx2d.stroke();
    ctx2d.fillStyle = color; ctx2d.font = "bold 9px Arial"; ctx2d.textAlign = "center";
    ctx2d.fillText(i + 1, x, y - 11);
  }
}

function renderPolyCurveForSet(curve, minV, maxV) {
  if (!curve || !curve.visible || !curve.coeff || !S.draws.length) return;
  const sortedDraws = [...S.draws].sort((a, b) => a.DrawDate < b.DrawDate ? -1 : 1);
  const color = SET_COLORS[(curve.set || 1) - 1] || "#f38ba8";
  ctx2d.strokeStyle = color; ctx2d.lineWidth = 2.5;
  ctx2d.setLineDash([]);
  ctx2d.beginPath();
  let started = false;
  for (let i = 0; i < sortedDraws.length; i++) {
    const y_data = evalCubic(curve.coeff, i);
    if (isNaN(y_data) || !isFinite(y_data)) { started = false; continue; }
    if (y_data < minV - 5 || y_data > maxV + 5) { started = false; continue; }
    const x = xOfDate(sortedDraws[i].DrawDate);
    const y = yOfValue(y_data, minV, maxV);
    if (y < PAD.top - 5 || y > PAD.top + pH() + 5) { started = false; continue; }
    if (!started) { ctx2d.moveTo(x, y); started = true; } else ctx2d.lineTo(x, y);
  }
  ctx2d.stroke();
}

function renderPolyOverlays(minV, maxV) {
  for (let s = 1; s <= 6; s++) {
    const curve = S.poly.curves[s];
    if (!curve || !curve.visible) continue;
    renderPolyPointList(curve.points, curve.set, minV, maxV);
    renderPolyCurveForSet(curve, minV, maxV);
  }
  renderPolyPointList(S.poly.points, S.poly.currentSet, minV, maxV);
}

// ── Refresh: fetch + render ───────────────────────────────────────
async function refresh() {
  await fetchDraws();
  await fetchBands();
  render();
  // Sync scrollbar to anchor's nearest draw index
  const r = await fetch(`/api/index_to_date?lotto=${S.lotto}&index=` +
    await anchorToIndex());
  // (scrollbar position already reflects anchor; no additional sync needed)
}

async function anchorToIndex() {
  // We need the draw index that corresponds to S.anchor date.
  // Use a reverse lookup via the draws array if available.
  const d = S.draws.length ? S.draws[S.draws.length - 1] : null;
  return d ? d.DrawIndex : S.indexHi;
}

// ── Navigation via /api/nav ───────────────────────────────────────
async function navigate(dir) {
  const r = await fetch(
    `/api/nav?lotto=${S.lotto}&dir=${dir}&days=${S.days}&anchor=${S.anchor}`
  );
  const data = await r.json();
  S.anchor     = data.anchor;
  S.cutoffPast = data.cutoff_past;
  S.effDays    = data.eff_days;
  // Sync scrollbar to the draw index nearest to new anchor
  const drawIndex = await dateToIndex(S.anchor);
  scrollbar.value = drawIndex;
  updateScrollLabel(drawIndex);
  await refresh();
}

async function dateToIndex(dateStr) {
  // Find nearest draw index for a date via the DB (via a draw lookup)
  // We fetch the draw list and pick the last one, or use an approximate index
  const draws = S.draws;
  if (draws.length) return draws[draws.length - 1].DrawIndex;
  return S.indexHi;
}

// ── Scrollbar ─────────────────────────────────────────────────────
// Scrollbar: maps draw index → date → use as new anchor (dtCutOffNow)
// NEVER triggers scraping. ONLY re-slices.
async function updateScrollLabel(idx) {
  const r = await fetch(`/api/index_to_date?lotto=${S.lotto}&index=${idx}`);
  const data = await r.json();
  const d = data.date || "";
  scrollLbl.textContent = `draw ${idx}  ${d}`;
  scrollLbl.textContent = `draw ${idx}  ${formatDisplayDate(d)}`;
  return d;
}

scrollbar.addEventListener("input", async () => {
  const idx = parseInt(scrollbar.value);
  const d = await updateScrollLabel(idx);
  if (d) {
    // Update anchor to this date; only re-slice, no scrape
    S.anchor = d;
    const pastDate = new Date(d + "T00:00:00");
    pastDate.setDate(pastDate.getDate() - S.effDays);
    S.cutoffPast = pastDate.toISOString().slice(0, 10);
  }
});

scrollbar.addEventListener("change", async () => {
  await fetchDraws();
  render();
});

// ── Plot interaction ──────────────────────────────────────────────
let _hlDraw = null;

let _hlSet = null;  // which set (1-6) was clicked

function drawHighlight() {
  if (!_hlDraw || _hlSet == null || !S._dateIndexMap) return;
  const minV = S.poly.minV, maxV = S.poly.maxV;
  const v = _hlDraw[`Nbr${_hlSet}`];
  if (v == null) return;
  const x = xOfDate(_hlDraw.DrawDate);
  const y = yOfValue(v, minV, maxV);
  const r = 23;
  const bubbleOffset = 32;
  const minX = PAD.left + r + 2;
  const maxX = canvas.width - PAD.right - r - 2;
  const minY = PAD.top + r + 2;
  const maxY = canvas.height - PAD.bottom - r - 2;
  // Offset circle up and to the left so the clicked point stays visible.
  // If the point is too close to the top or left edge, flip the badge
  // below or to the right so it remains fully visible.
  let cx = x - bubbleOffset;
  let cy = y - bubbleOffset;
  if (cy < minY) {
    cy = y + bubbleOffset;
  }
  if (cx < minX) {
    cx = x + bubbleOffset;
  }
  cx = Math.max(minX, Math.min(maxX, cx));
  cy = Math.max(minY, Math.min(maxY, cy));
  // Filled circle
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r, 0, Math.PI * 2);
  ctx2d.fillStyle = SET_COLORS[_hlSet - 1];
  ctx2d.fill();
  // Border
  ctx2d.strokeStyle = "#ffffff";
  ctx2d.lineWidth = 2;
  ctx2d.stroke();
  // Number inside
  ctx2d.fillStyle = "#ffffff";
  ctx2d.font = "bold 17px Arial";
  ctx2d.textAlign = "center";
  ctx2d.textBaseline = "middle";
  ctx2d.fillText(String(v), cx, cy);
  ctx2d.textBaseline = "alphabetic";
}

function closestSetPoint(draw, py) {
  const minV = S.poly.minV, maxV = S.poly.maxV;
  let bestSet = 1, bestDist = Infinity, bestVal = null;
  for (let s = 1; s <= 6; s++) {
    const v = draw[`Nbr${s}`];
    if (v == null) continue;
    const dy = Math.abs(yOfValue(v, minV, maxV) - py);
    if (dy < bestDist) {
      bestDist = dy;
      bestSet = s;
      bestVal = v;
    }
  }
  return bestVal == null ? null : { set: bestSet, val: bestVal };
}

function measurePointFromClick(draw, py) {
  const point = closestSetPoint(draw, py);
  return { draw, set: point ? point.set : 1 };
}

function getMeasuredDrawDistance() {
  const { start, end } = S.measure;
  if (!start || !end) return null;
  const startPos = S._dateIndexMap?.[start.draw.DrawDate];
  const endPos = S._dateIndexMap?.[end.draw.DrawDate];
  if (startPos == null || endPos == null) return null;
  return Math.abs(endPos - startPos);
}

function updateMeasureInfo() {
  const { active, start, end } = S.measure;
  if (!active) {
    measureInfo.textContent = "";
    return;
  }
  if (!start) {
    measureInfo.textContent = "Select first point";
    return;
  }
  if (!end) {
    measureInfo.textContent = `Start ${formatDisplayDate(start.draw.DrawDate)}`;
    return;
  }
  measureInfo.textContent = `${getMeasuredDrawDistance()} drawings`;
}

function clearMeasureSelection() {
  S.measure.start = null;
  S.measure.end = null;
  updateMeasureInfo();
}

function renderMeasureOverlay() {
  const { start, end } = S.measure;
  if (!S.measure.active || !start || !end) return;

  const minV = S.poly.minV, maxV = S.poly.maxV;
  const startVal = start.draw[`Nbr${start.set}`];
  const endVal = end.draw[`Nbr${end.set}`];
  if (startVal == null || endVal == null) return;

  const x1 = xOfDate(start.draw.DrawDate);
  const x2 = xOfDate(end.draw.DrawDate);
  const y1 = yOfValue(startVal, minV, maxV);
  const y2 = yOfValue(endVal, minV, maxV);
  const topY = Math.max(PAD.top + 24, Math.min(y1, y2) - 110);
  const distance = getMeasuredDrawDistance();

  ctx2d.save();
  ctx2d.strokeStyle = "#000000";
  ctx2d.lineWidth = 5;
  ctx2d.beginPath();
  ctx2d.moveTo(x1, y1);
  ctx2d.lineTo(x1, topY);
  ctx2d.moveTo(x2, y2);
  ctx2d.lineTo(x2, topY);
  ctx2d.stroke();

  ctx2d.fillStyle = "#000000";
  ctx2d.font = "bold 24px Arial";
  ctx2d.textAlign = "center";
  ctx2d.fillText(String(distance), (x1 + x2) / 2, topY + 28);
  ctx2d.restore();
}

canvas.addEventListener("mousedown", (e) => {
  if (S.curveOn) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  if (px < PAD.left || px > PAD.left + pW()) return;
  const draw = drawAtX(px);
  if (!draw) return;
  if (S.measure.active) {
    const point = measurePointFromClick(draw, py);
    if (!S.measure.start || S.measure.end) {
      S.measure.start = point;
      S.measure.end = null;
    } else {
      S.measure.end = point;
    }
    updateMeasureInfo();
    render();
    return;
  }
  _hlDraw = draw;

  // Find which set's point is closest to the click (Y distance)
  const minV = S.poly.minV, maxV = S.poly.maxV;
  let bestSet = 1, bestDist = Infinity;
  for (let s = 1; s <= 6; s++) {
    const v = draw[`Nbr${s}`];
    if (v == null) continue;
    const dy = Math.abs(yOfValue(v, minV, maxV) - py);
    if (dy < bestDist) { bestDist = dy; bestSet = s; }
  }
  _hlSet = bestSet;

  // Show wins bar
  const wDate = document.getElementById("wins-date");
  wDate.textContent = draw.DrawDate;
  wDate.textContent = formatDisplayDate(draw.DrawDate);
  wDate.style.color = "#0055cc";
  const wBalls = document.getElementById("wins-balls");
  wBalls.innerHTML = "";
  for (let s = 1; s <= 6; s++) {
    const v = draw[`Nbr${s}`];
    if (v == null) continue;
    const b = document.createElement("div");
    b.className = "wins-ball";
    b.style.background = SET_COLORS[s - 1];
    b.textContent = v;
    wBalls.appendChild(b);
  }
  drawHighlight();
});

canvas.addEventListener("mouseup", (e) => {
  if (S.curveOn) return;
  if (S.measure.active) return;
  if (_hlDraw) { _hlDraw = null; _hlSet = null; render(); }
});

canvas.addEventListener("mousemove", (e) => {
  if (S.curveOn) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  if (px < PAD.left || px > PAD.left + pW()) { statusHov.textContent = ""; return; }
  const draw = drawAtX(px);
  if (draw) {
    statusHov.textContent =
      `${draw.DrawDate}  draw #${draw.DrawIndex}  |  ` +
      [1,2,3,4,5].map(s => draw[`Nbr${s}`]).join(" · ") +
      (draw.Nbr6 != null ? (S.lotto === 'FL' ? ` · ${draw.Nbr6}` : `  +${draw.Nbr6}`) : "");
  }
});
canvas.addEventListener("mouseleave", () => { statusHov.textContent = ""; });

// ── Exploratory curve drawing ─────────────────────────────────────
const btnCT = document.getElementById("btn-curve-toggle");
const datasetToolbar = document.getElementById("dataset-toolbar");

function updateFadeState() {
  const faded = S.curveOn || S.poly.active;
  datasetToolbar.classList.toggle('datasets-faded', faded);
  canvas.classList.toggle('mode-curve', S.curveOn);

// ── Polynomial: cubic fit (data-space) ───────────────────────────
// Solves the 4×4 Vandermonde system for a cubic y = a + b·x + c·x² + d·x³
// passing exactly through 4 points. Uses Gaussian elimination.
function fitCubic(pts) {
  // pts: [{date, val}, ...] — 4 points sorted by date
  // x = position index 0..3 is too narrow; use global draw index for better scaling
  // Map each point's date to its index in the full sorted draw list
  const sortedDraws = [...S.draws].sort((a, b) => a.DrawDate < b.DrawDate ? -1 : 1);
  const xs = pts.map(p => {
    const idx = sortedDraws.findIndex(d => d.DrawDate === p.date);
    return idx >= 0 ? idx : 0;
  });
  const ys = pts.map(p => p.val);

  // Build 4×5 augmented Vandermonde matrix
  const M = xs.map((x, i) => [1, x, x*x, x*x*x, ys[i]]);

  // Gaussian elimination with partial pivoting
  for (let col = 0; col < 4; col++) {
    // Find pivot
    let maxRow = col;
    for (let r = col+1; r < 4; r++)
      if (Math.abs(M[r][col]) > Math.abs(M[maxRow][col])) maxRow = r;
    [M[col], M[maxRow]] = [M[maxRow], M[col]];

    if (Math.abs(M[col][col]) < 1e-12) return null; // singular

    for (let r = 0; r < 4; r++) {
      if (r === col) continue;
      const f = M[r][col] / M[col][col];
      for (let c = col; c <= 4; c++) M[r][c] -= f * M[col][c];
    }
  }

  // Back-substitute
  return M.map((row, i) => row[4] / row[i]);  // [a, b, c, d]
}

function evalCubic(coeff, x) {
  const [a, b, c, d] = coeff;
  return a + b*x + c*x*x + d*x*x*x;
}

// ── Canvas poly click: snap to nearest visible data point ────────
canvas.addEventListener('click', (e) => {
  if (!S.poly.active) return;
  if (!S.draws.length) return;

  e.stopImmediatePropagation();

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (mx < PAD.left || mx > PAD.left + pW()) return;

  // Use geometry cached at last render() — guarantees identical coordinate system
  // ── Step 1: invert X pixel → timestamp using cached geometry ──
  // Find nearest draw by X pixel distance (index-based spacing)
  // Find draw whose X pixel position is closest to the click (index-based spacing)
  const sortedDraws = S.poly._sortedDraws || [...S.draws].sort((a,b) => a.DrawDate < b.DrawDate ? -1 : 1);
  let nearestDi = 0;
  let bestDt = Math.abs(xOfDate(sortedDraws[0].DrawDate) - mx);
  for (let i = 1; i < sortedDraws.length; i++) {
    const dt = Math.abs(xOfDate(sortedDraws[i].DrawDate) - mx);
    if (dt < bestDt) { bestDt = dt; nearestDi = i; }
  }
  const draw = sortedDraws[nearestDi];

  const point = closestSetPoint(draw, my);
  if (!point) return;

  if (S.poly.currentSet == null) {
    S.poly.currentSet = point.set;
  } else if (point.set !== S.poly.currentSet) {
    document.getElementById('poly-status').textContent =
      `Curve locked to set ${S.poly.currentSet}; click that set only`;
    render();
    return;
  }

  S.poly.points.push({ date: draw.DrawDate, val: point.val });
  updateLEDs();

  const n = S.poly.points.length;
  const debugInfo = `${formatDisplayDate(draw.DrawDate)} set ${point.set} val=${point.val}`;
  if (n < 4) {
    document.getElementById('poly-status').textContent = `Set ${point.set}: ${n}/4 — last: ${debugInfo}`;
  } else {
    const points = [...S.poly.points].sort((a, b) => a.date < b.date ? -1 : 1);
    const coeff = fitCubic(points);
    if (coeff) {
      S.poly.curves[point.set] = { set: point.set, points, coeff, visible: true };
      updatePolyCurveToggles();
      document.getElementById('poly-status').textContent = `Curve saved for set ${point.set}`;
    } else {
      document.getElementById('poly-status').textContent = `Fit failed for set ${point.set}`;
    }
    S.poly.points = [];
    S.poly.currentSet = null;
    updateLEDs();
  }

  render();
});

// ── Next draw date logic ──────────────────────────────────────────
// Returns YYYY-MM-DD string of the next scheduled draw after lastDate.

function nextDrawDate(lotto, lastDateStr) {
  const d = new Date(lastDateStr + "T12:00:00");
  const dow = d.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat

  let addDays = 0;

  if (lotto === "CA" || lotto === "FL") {
    // Wed(3), Sat(6)
    const next = { 0:3, 1:2, 2:1, 3:3, 4:2, 5:1, 6:4 };
    addDays = next[dow];
  } else if (lotto === "MM") {
    // Tue(2), Fri(5)
    const next = { 0:2, 1:1, 2:3, 3:2, 4:1, 5:4, 6:3 };
    addDays = next[dow];
  } else if (lotto === "PB" || lotto === "PD") {
    // Mon(1), Wed(3), Sat(6)
    const next = { 0:1, 1:2, 2:1, 3:3, 4:2, 5:1, 6:2 };
    addDays = next[dow];
  }

  d.setDate(d.getDate() + addDays);
  return d.toISOString().slice(0, 10);
}

// ── SAFE forward/backward ordering ───────────────────────────────
// Operates ONLY on safeMin/safeMax arrays (index 1..6).
// HOT arrays are passed through completely untouched.
// Set 6 is excluded from ordering for all types except FL.

function applySafeOrdering(lotto, safeMin, safeMax) {
  // Work on copies — never mutate HOT
  const sMin = safeMin.slice();  // index 0 unused; 1..6 live
  const sMax = safeMax.slice();

  const set6Independent = (lotto !== "FL");

  // Forward pass: sMin[k] >= sMin[k-1] + 1
  for (let k = 2; k <= 5; k++) {
    const required = sMin[k - 1] + 1;
    if (sMin[k] < required) sMin[k] = required;
  }
  if (!set6Independent) {
    const required = sMin[5] + 1;
    if (sMin[6] < required) sMin[6] = required;
  }

  // Forward pass: sMax[k] >= sMax[k-1] + 1
  for (let k = 2; k <= 5; k++) {
    const required = sMax[k - 1] + 1;
    if (sMax[k] < required) sMax[k] = required;
  }
  if (!set6Independent) {
    const required = sMax[5] + 1;
    if (sMax[6] < required) sMax[6] = required;
  }

  // Backward pass: sMax[k] <= sMax[k+1] - 1
  for (let k = 4; k >= 1; k--) {
    const allowed = sMax[k + 1] - 1;
    if (sMax[k] > allowed) sMax[k] = allowed;
  }
  if (!set6Independent) {
    const allowed = sMax[6] - 1;
    if (sMax[5] > allowed) sMax[5] = allowed;
  }

  return { sMin, sMax };
}

// ── Fetch and display Future Corridor ────────────────────────────

async function openFutureCorridor() {
  const overlay  = document.getElementById("fc-overlay");
  const modal    = document.getElementById("fc-modal");
  const status   = document.getElementById("fc-status");
  const tbody    = document.getElementById("fc-tbody");
  const lbl      = document.getElementById("fc-lotto-label");
  const dateLbl  = document.getElementById("fc-date-label");

  const LOTTO_LABELS = {
    CA: "California Lotto",
    FL: "Florida Lotto",
    MM: "Mega Millions",
    PB: "Powerball",
    PD: "Powerball Double",
  };

  overlay.style.display = "flex";
  if (!overlay.dataset.positioned) {
    requestAnimationFrame(() => {
      const left = Math.max(12, Math.round((window.innerWidth - modal.offsetWidth) / 2));
      const top = Math.max(12, Math.round((window.innerHeight - modal.offsetHeight) / 2));
      modal.style.left = `${left}px`;
      modal.style.top = `${top}px`;
      overlay.dataset.positioned = "true";
    });
  }
  status.textContent = "Loading…";
  tbody.innerHTML = "";
  lbl.textContent = LOTTO_LABELS[S.lotto] || S.lotto;
  dateLbl.textContent = "";

  // Forecast date = next draw after latest known draw
  const forecastDate = nextDrawDate(S.lotto, S.latest);
  dateLbl.textContent = formatDisplayDate(forecastDate);

  // Forecast rows are stored under the latest known draw date and represent
  // the projection for the next draw shown above.
  const url = `/api/forecast?lotto=${S.lotto}&cutoff_now=${S.latest}&cutoff_past=${S.latest}`;
  let rows;
  try {
    const r = await fetch(url);
    rows = await r.json();
  } catch(e) {
    status.textContent = "Error loading forecast data.";
    return;
  }

  if (!rows || !rows.length) {
    status.textContent = "No forecast data available.";
    return;
  }

  // Build per-set band arrays (index 1..6)
  const safeMin = new Array(7).fill(0);
  const safeMax = new Array(7).fill(0);
  const hotMin  = new Array(7).fill(null);
  const hotMax  = new Array(7).fill(null);
  const hasSet  = new Array(7).fill(false);

  for (const row of rows) {
    const s = row.SetNumber;
    if (s < 1 || s > 6) continue;
    safeMin[s] = row.SafeLow;
    safeMax[s] = row.SafeHigh;
    hotMin[s]  = row.HotLow  != null ? row.HotLow  : null;
    hotMax[s]  = row.HotHigh != null ? row.HotHigh : null;
    hasSet[s]  = true;
  }

  // Store raw for toggle re-render
  overlay._safeMin = safeMin.slice();
  overlay._safeMax = safeMax.slice();
  overlay._hotMin  = hotMin.slice();
  overlay._hotMax  = hotMax.slice();
  overlay._hasSet  = hasSet.slice();

  renderFCGrid(false);
  status.textContent = "";
}

function renderFCGrid(applyOrdering) {
  const overlay = document.getElementById("fc-overlay");
  const tbody   = document.getElementById("fc-tbody");

  const safeMin = overlay._safeMin.slice();
  const safeMax = overlay._safeMax.slice();
  const hotMin  = overlay._hotMin.slice();   // never touched
  const hotMax  = overlay._hotMax.slice();   // never touched
  const hasSet  = overlay._hasSet;

  // Apply SAFE ordering if toggled ON — HOT untouched
  let dispSafeMin = safeMin;
  let dispSafeMax = safeMax;
  if (applyOrdering) {
    const ordered = applySafeOrdering(S.lotto, safeMin, safeMax);
    dispSafeMin = ordered.sMin;
    dispSafeMax = ordered.sMax;
  }

  tbody.innerHTML = "";
  for (let s = 1; s <= 6; s++) {
    if (!hasSet[s]) continue;
    const tr = document.createElement("tr");

    const hotLowCell  = hotMin[s] != null
      ? `<td class="fc-td-hot">${hotMin[s]}</td>`
      : `<td class="fc-td-hot-null">—</td>`;
    const hotHighCell = hotMax[s] != null
      ? `<td class="fc-td-hot">${hotMax[s]}</td>`
      : `<td class="fc-td-hot-null">—</td>`;

    tr.innerHTML = `
      <td class="fc-td-label">Set ${s}</td>
      <td class="fc-td-safe">${dispSafeMin[s]}</td>
      <td class="fc-td-safe">${dispSafeMax[s]}</td>
      ${hotLowCell}
      ${hotHighCell}
    `;
    tbody.appendChild(tr);
  }
}

document.getElementById("chk-safe-order").addEventListener("change", function() {
