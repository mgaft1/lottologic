<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: #181825;
  border: 1px solid #313244;
  border-radius: 8px;
  padding: 36px 40px;
  width: 320px;
}
.login-box h1 {
  font-size: 1.2rem;
  color: #89b4fa;
  margin-bottom: 24px;
  text-align: center;
}
label {
  display: block;
  font-size: 0.82rem;
  color: #a6adc8;
  margin-bottom: 4px;
}
input[type=text], input[type=password] {
  width: 100%;
  background: #313244;
  border: 1px solid #45475a;
  color: #cdd6f4;
  padding: 8px 10px;
  border-radius: 4px;
  font-size: 0.9rem;
  margin-bottom: 16px;
  outline: none;
}
input[type=text]:focus, input[type=password]:focus {
  border-color: #89b4fa;
}
button[type=submit] {
  width: 100%;
  background: #89b4fa;
  color: #1e1e2e;
  border: none;
  padding: 9px;
  border-radius: 4px;
  font-size: 0.9rem;
  font-weight: bold;
  cursor: pointer;
}
button[type=submit]:hover { background: #74c7ec; }
.error {
  background: #3e2030;
  border: 1px solid #f38ba8;
  color: #f38ba8;
  border-radius: 4px;
  padding: 8px 10px;
  font-size: 0.82rem;
  margin-bottom: 14px;
}
</style>
</head>
<body>
<div class="login-box">
  <h1>Lotto Viewer</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autofocus autocomplete="username">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
