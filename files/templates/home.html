<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottologic Home</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #eef3fb;
  --panel: rgba(255, 255, 255, 0.9);
  --ink: #10233f;
  --muted: #5f7088;
  --line: rgba(16, 35, 63, 0.12);
  --accent: #165dff;
  --accent-2: #0f89ff;
  --shadow: 0 28px 80px rgba(31, 53, 92, 0.16);
}

body {
  min-height: 100vh;
  font-family: "Segoe UI", "Helvetica Neue", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(29, 94, 255, 0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(16, 165, 181, 0.18), transparent 26%),
    linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
}

.shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

#navbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 20px 32px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.58);
  backdrop-filter: blur(14px);
}

.brand {
  font-size: 1.2rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-links a,
.logout {
  text-decoration: none;
}

.nav-links a {
  color: #ffffff;
  font-size: 1.38rem;
  font-weight: bold;
  padding: 7px 14px;
  background: #4488ff;
  border: 1px solid #2266dd;
  border-radius: 4px;
  line-height: 1;
}

.nav-links a:hover {
  background: #3d7cf0;
}

.logout:hover {
  color: var(--accent);
}

.logout {
  margin-left: auto;
  color: var(--muted);
  font-size: 0.98rem;
  font-weight: 600;
}

#content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}

.hero {
  width: min(760px, 100%);
}

.actions {
  background: var(--panel);
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 28px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  padding: 34px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.action-card {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 112px;
  padding: 24px 28px;
  border-radius: 24px;
  text-decoration: none;
  color: #ffffff;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  border: 1px solid rgba(16, 35, 63, 0.08);
  box-shadow: 0 18px 36px rgba(22, 93, 255, 0.24);
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
}

.action-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 26px 46px rgba(22, 93, 255, 0.28);
  filter: saturate(1.05);
}

.action-card h3 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 900;
  letter-spacing: 0.01em;
  text-align: center;
}

@media (max-width: 860px) {
  #navbar {
    flex-wrap: wrap;
    gap: 12px 18px;
    padding: 18px 20px;
  }

  .logout {
    margin-left: 0;
  }

  .hero {
    width: 100%;
  }

  .actions {
    padding: 28px;
  }

  .action-card {
    min-height: 96px;
    padding: 22px;
  }
}
</style>
</head>
<body>
<div class="shell">
  <div id="navbar">
    <div class="brand">Lottologic</div>
    <div class="nav-links">
      <a href="/">Lotto Viewer</a>
      <a href="/gaps">Time Gaps</a>
      <a href="/tickets">Predictions</a>
      <a href="/links">Links</a>
    </div>
    <a href="/logout" class="logout">Sign out</a>
  </div>

  <div id="content">
    <div class="hero">
      <section class="actions">
        <a class="action-card" href="/">
          <h3>Lotto Viewer</h3>
        </a>

        <a class="action-card" href="/gaps">
          <h3>Time Gaps</h3>
        </a>

        <a class="action-card" href="/links">
          <h3>Links</h3>
        </a>

        <a class="action-card" href="/tickets">
          <h3>Predictions</h3>
        </a>
      </section>
    </div>
  </div>
</div>
</body>
</html>
